<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RL Attack Demo – Noise & Observation Manipulation</title>
<style>
  body { font-family: Arial; display: flex; gap: 20px; }
  canvas { border: 1px solid black; cursor: pointer; }
  .panel { max-width: 250px; }
  label { display: block; margin-top: 10px; }
</style>
</head>
<body>

<canvas id="grid" width="360" height="360"></canvas>

<div class="panel">
  <h3>Controls</h3>

  <label>Goal Reward: <span id="grv">10</span>
    <input type="range" id="goalReward" min="0" max="20" value="10">
  </label>

  <label>Tile Reward: <span id="trv">2</span>
    <input type="range" id="tileReward" min="0" max="10" value="2">
  </label>

  <label>Step Penalty: <span id="spv">-0.1</span>
    <input type="range" id="stepPenalty" min="-1" max="0" step="0.05" value="-0.1">
  </label>

  <label>
    <input type="checkbox" id="fakeGoal"> Fake Goal (Observation Attack)
  </label>

  <label>Noise: <span id="nv">0</span>
    <input type="range" id="noise" min="0" max="0.5" step="0.05" value="0">
  </label>

  <button onclick="step()">Step</button>
  <button onclick="run()">Run</button>
  <button onclick="reset()">Reset</button>

  <p>Click on grid cells to add/remove gold tiles (reward tiles)</p>
  <p id="info"></p>
</div>

<script>
const size = 6;
const cell = 60;

let agent, goal, rewardTiles;
let running = false;
let lastPos = null;

// UI refs
const goalRewardInput = document.getElementById("goalReward");
const tileRewardInput = document.getElementById("tileReward");
const stepPenaltyInput = document.getElementById("stepPenalty");
const fakeGoalInput = document.getElementById("fakeGoal");
const noiseInput = document.getElementById("noise");

function reset() {
  agent = {x: 0, y: 0};
  goal = {x: 5, y: 5};
  rewardTiles = [{x: 2, y: 2}];
  running = false;
  lastPos = null;
  draw();
}

// Sample perceived goal **once per step**
function getPerceivedGoal() {
  let perceivedGoal = fakeGoalInput.checked ? {x:0, y:5} : {...goal};
  if (Math.random() < noiseInput.value) {
    perceivedGoal = {
      x: Math.floor(Math.random() * size),
      y: Math.floor(Math.random() * size)
    };
  }
  return perceivedGoal;
}

// Reward calculation uses **passed perceivedGoal**
function reward(x, y, perceivedGoal) {
  let r = parseFloat(stepPenaltyInput.value);
  if (x === perceivedGoal.x && y === perceivedGoal.y) r += parseFloat(goalRewardInput.value);
  for (let t of rewardTiles) {
    if (x === t.x && y === t.y) r += parseFloat(tileRewardInput.value);
  }
  return r;
}

// Recursive evaluation
function evaluate(x, y, depth, perceivedGoal, visited=new Set()) {
  if (depth === 0) return 0;
  const moves = [
    {dx:1, dy:0}, {dx:-1, dy:0}, {dx:0, dy:1}, {dx:0, dy:-1}
  ];

  let best = -Infinity;
  for (let m of moves) {
    const nx = x + m.dx;
    const ny = y + m.dy;
    if (nx < 0 || ny < 0 || nx >= size || ny >= size) continue;

    const key = `${nx},${ny}`;
    if (visited.has(key)) continue;

    const newVisited = new Set(visited);
    newVisited.add(key);

    let score = reward(nx, ny, perceivedGoal) + evaluate(nx, ny, depth-1, perceivedGoal, newVisited);
    best = Math.max(best, score);
  }
  return best;
}

function bestMove(perceivedGoal) {
  const moves = [
    {dx:1, dy:0}, {dx:-1, dy:0}, {dx:0, dy:1}, {dx:0, dy:-1}
  ];

  let best = null;
  let bestScore = -Infinity;

  for (let m of moves) {
    const nx = agent.x + m.dx;
    const ny = agent.y + m.dy;
    if (nx < 0 || ny < 0 || nx >= size || ny >= size) continue;
    if (lastPos && nx === lastPos.x && ny === lastPos.y) continue;

    let score = evaluate(nx, ny, 4, perceivedGoal);
    if (score > bestScore) {
      bestScore = score;
      best = {x: nx, y: ny};
    }
  }

  lastPos = {...agent};
  return best;
}

function step() {
  const perceivedGoal = getPerceivedGoal();
  const onTrueGoal = agent.x === goal.x && agent.y === goal.y;
  const rewardTileHere = rewardTiles.some(t => t.x === agent.x && t.y === agent.y);

  // Stay on true goal if no reward tile and no fake goal
  if (onTrueGoal && !rewardTileHere && !fakeGoalInput.checked) {
    draw(perceivedGoal);
    return;
  }

  const move = bestMove(perceivedGoal);
  if (move) agent = move;

  draw(perceivedGoal);
}

function run() {
  running = !running;
  loop();
}

function loop() {
  if (!running) return;
  step();
  setTimeout(loop, 300);
}

function draw(perceivedGoal) {
  const ctx = document.getElementById("grid").getContext("2d");
  ctx.clearRect(0, 0, 360, 360);

  // grid
  for (let i = 0; i < size; i++) {
    for (let j = 0; j < size; j++) {
      ctx.strokeRect(i*cell, j*cell, cell, cell);
    }
  }

  // true goal
  ctx.fillStyle = "green";
  ctx.fillRect(goal.x*cell+10, goal.y*cell+10, 40, 40);

  // reward tiles
  ctx.fillStyle = "gold";
  for (const t of rewardTiles) {
    ctx.fillRect(t.x*cell+15, t.y*cell+15, 30, 30);
  }

  // perceived goal visual
  ctx.strokeStyle = "blue";
  ctx.lineWidth = 3;
  ctx.strokeRect(perceivedGoal.x*cell+5, perceivedGoal.y*cell+5, 50, 50);

  // agent
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(agent.x*cell+30, agent.y*cell+30, 15, 0, 2*Math.PI);
  ctx.fill();

  document.getElementById("info").innerText =
    `Agent: (${agent.x}, ${agent.y}) Perceived Goal: (${perceivedGoal.x}, ${perceivedGoal.y})`;
}

// click to toggle reward tiles
document.getElementById("grid").addEventListener("click", e => {
  const rect = e.target.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left)/cell);
  const y = Math.floor((e.clientY - rect.top)/cell);

  const index = rewardTiles.findIndex(t => t.x === x && t.y === y);
  if (index >= 0) rewardTiles.splice(index, 1);
  else rewardTiles.push({x, y});

  draw(getPerceivedGoal());
});

// UI updates
goalRewardInput.oninput = () => grv.innerText = goalRewardInput.value;
tileRewardInput.oninput = () => trv.innerText = tileRewardInput.value;
stepPenaltyInput.oninput = () => spv.innerText = stepPenaltyInput.value;
noiseInput.oninput = () => nv.innerText = noiseInput.value;

reset();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RL Attack Demo – Break the Robot</title>
<style>
  body { font-family: Arial; display: flex; gap: 20px; }
  canvas { border: 1px solid black; cursor: pointer; }
  .panel { max-width: 250px; }
  label { display: block; margin-top: 10px; }
</style>
</head>
<body>

<canvas id="grid" width="360" height="360"></canvas>

<div class="panel">
  <h3>Controls</h3>

  <label>Goal Reward: <span id="grv">10</span>
    <input type="range" id="goalReward" min="0" max="20" value="10">
  </label>

  <label>Tile Reward: <span id="trv">2</span>
    <input type="range" id="tileReward" min="0" max="10" value="2">
  </label>

  <label>Step Penalty: <span id="spv">-0.1</span>
    <input type="range" id="stepPenalty" min="-1" max="0" step="0.05" value="-0.1">
  </label>

  <label>
    <input type="checkbox" id="fakeGoal"> Fake Goal (Observation Attack)
  </label>

  <label>Noise: <span id="nv">0</span>
    <input type="range" id="noise" min="0" max="0.5" step="0.05" value="0">
  </label>

  <button onclick="step()">Step</button>
  <button onclick="run()">Run</button>
  <button onclick="reset()">Reset</button>

  <p>Click on grid cells to add/remove gold tiles (reward tiles)</p>
  <p id="info"></p>
</div>

<script>
const size = 6;
const cell = 60;

let agent, goal, rewardTiles;
let running = false;
let lastPos = null; // prevent ping-pong
let goalReached = false; // tracks if agent reached goal

// UI refs
const goalRewardInput = document.getElementById("goalReward");
const tileRewardInput = document.getElementById("tileReward");
const stepPenaltyInput = document.getElementById("stepPenalty");
const fakeGoalInput = document.getElementById("fakeGoal");
const noiseInput = document.getElementById("noise");

function reset() {
  agent = {x: 0, y: 0};
  goal = {x: 5, y: 5};
  rewardTiles = [{x: 2, y: 2}];
  running = false;
  lastPos = null;
  goalReached = false;
  draw();
}

function getObservation() {
  let obsGoal = {...goal};

  if (fakeGoalInput.checked) {
    obsGoal = {x: 0, y: 5}; // fake location
  }

  // noise
  if (Math.random() < noiseInput.value) {
    obsGoal = {
      x: Math.floor(Math.random() * size),
      y: Math.floor(Math.random() * size)
    };
  }

  return obsGoal;
}

function reward(x, y) {
  let r = parseFloat(stepPenaltyInput.value);

  if (x === goal.x && y === goal.y) {
    r += parseFloat(goalRewardInput.value);
  }

  for (let t of rewardTiles) {
    if (x === t.x && y === t.y) {
      r += parseFloat(tileRewardInput.value);
    }
  }

  return r;
}

// Recursive evaluation with lookahead
function evaluate(x, y, depth, visited=new Set(), obsGoal) {
  if (depth === 0) return 0;

  const moves = [
    {dx:1, dy:0},
    {dx:-1, dy:0},
    {dx:0, dy:1},
    {dx:0, dy:-1}
  ];

  let best = -Infinity;

  for (let m of moves) {
    let nx = x + m.dx;
    let ny = y + m.dy;

    if (nx < 0 || ny < 0 || nx >= size || ny >= size) continue;

    const key = `${nx},${ny}`;
    if (visited.has(key)) continue; // prevent cycles in lookahead

    let newVisited = new Set(visited);
    newVisited.add(key);

    // Dynamic reward-hacking: reward dominates when high
    let score = reward(nx, ny) + evaluate(nx, ny, depth - 1, newVisited, obsGoal);

    if (score > best) best = score;
  }

  return best;
}

function bestMove(obsGoal) {
  const moves = [
    {dx:1, dy:0},
    {dx:-1, dy:0},
    {dx:0, dy:1},
    {dx:0, dy:-1}
  ];

  let best = null;
  let bestScore = -Infinity;

  for (let m of moves) {
    let nx = agent.x + m.dx;
    let ny = agent.y + m.dy;

    if (nx < 0 || ny < 0 || nx >= size || ny >= size) continue;

    // prevent immediate backtracking
    if (lastPos && nx === lastPos.x && ny === lastPos.y) continue;

    let score = evaluate(nx, ny, 4, new Set(), obsGoal);

    if (score > bestScore) {
      bestScore = score;
      best = {x: nx, y: ny};
    }
  }

  lastPos = {...agent};
  return best;
}

function step() {
  const obsGoal = getObservation(); // perceived goal
  const onTrueGoal = agent.x === goal.x && agent.y === goal.y;
  const rewardTileHere = rewardTiles.some(t => t.x === agent.x && t.y === agent.y);

  // Standard behavior: stay on goal unless reward tiles or fake goal present
  if (onTrueGoal && !rewardTileHere && !fakeGoalInput.checked) {
    draw();
    return;
  }

  let move = bestMove(obsGoal);
  if (move) agent = move;

  if (!goalReached && onTrueGoal) {
    goalReached = true;
  }

  draw();
}

function run() {
  running = !running;
  loop();
}

function loop() {
  if (!running) return;
  step();
  setTimeout(loop, 300);
}

function draw() {
  const ctx = document.getElementById("grid").getContext("2d");
  ctx.clearRect(0, 0, 360, 360);

  // grid
  for (let i = 0; i < size; i++) {
    for (let j = 0; j < size; j++) {
      ctx.strokeRect(i*cell, j*cell, cell, cell);
    }
  }

  // goal (true)
  ctx.fillStyle = "green";
  ctx.fillRect(goal.x*cell+10, goal.y*cell+10, 40, 40);

  // reward tiles
  ctx.fillStyle = "gold";
  for (let t of rewardTiles) {
    ctx.fillRect(t.x*cell+15, t.y*cell+15, 30, 30);
  }

  // fake goal (visual hint)
  if (fakeGoalInput.checked) {
    ctx.strokeStyle = "blue";
    ctx.lineWidth = 3;
    ctx.strokeRect(0*cell+5, 5*cell+5, 50, 50);
  }

  // agent
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(agent.x*cell+30, agent.y*cell+30, 15, 0, Math.PI*2);
  ctx.fill();

  document.getElementById("info").innerText =
    `Agent: (${agent.x}, ${agent.y})`;
}

// Click-to-place reward tiles
document.getElementById("grid").addEventListener("click", e => {
  const rect = e.target.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left)/cell);
  const y = Math.floor((e.clientY - rect.top)/cell);

  // toggle tile
  const index = rewardTiles.findIndex(t => t.x === x && t.y === y);
  if (index >= 0) {
    rewardTiles.splice(index, 1); // remove
  } else {
    rewardTiles.push({x, y}); // add
  }

  draw();
});

// UI updates
goalRewardInput.oninput = () => grv.innerText = goalRewardInput.value;
tileRewardInput.oninput = () => trv.innerText = tileRewardInput.value;
stepPenaltyInput.oninput = () => spv.innerText = stepPenaltyInput.value;
noiseInput.oninput = () => nv.innerText = noiseInput.value;

reset();
</script>

</body>
</html>
